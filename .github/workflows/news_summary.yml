name: Daily News Summary

concurrency:
  group: news-summarizer
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 9 * * *"  # UTC9:00（日本時間18:00）に毎日実行
  workflow_dispatch:      # 手動実行可能

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      #- uses: actions/checkout@v4.1.0
      - uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0        # 🔥 フル履歴を取得
          ref: main             # 🔥 main ブランチを明示的にチェックアウト
          token: ${{ secrets.GITHUB_TOKEN }} 
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Run News Summarizer
        env:
          # NewsAPI設定
          NEWS_API_KEY: ${{ secrets.MY_NEWS_API_KEY }}
          SELECT_TOP_N: ${{ secrets.SELECT_TOP_N || 5 }}  # デフォルト5件
          MAX_ARTICLES: ${{ secrets.MAX_ARTICLES || 20 }} # デフォルト20件
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS }}
       
          # PubMed設定
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
          PUBMED_SEARCH_KEYWORDS: ${{ secrets.PUBMED_SEARCH_KEYWORDS }}
          
          # 通知先設定
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          
          # AIモデル設定
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-3.5-turbo' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          #GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-1.5-flash-lite' }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-3.1-flash-lite' }}
          #GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-3.5-flash' }}
          
          # 翻訳設定
          TARGET_LANGUAGE: ${{ secrets.TARGET_LANGUAGE || 'ja' }}
          
        run: python main.py
      - name: Save seen_papers.json to repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          if [ ! -f seen_papers.json ]; then
            echo "seen_papers.json not found, skipping commit"
            exit 0
          fi
          
          # ローカルの変更を一時保存
          git stash
          
          # リモートの最新状態を取得
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          
          # 変更を復元
          git stash pop || git stash drop
          
          # 変更がある場合のみコミット・プッシュ
          if git diff --quiet; then
            echo "No changes to seen_papers.json"
            exit 0
          fi
          
          git add seen_papers.json
          git commit -m "Update seen_papers.json [auto]"
          
          # リトライロジック
          for attempt in {1..5}; do
            echo "Push attempt $attempt/5"
            git fetch origin main
            git rebase origin/main
            if git push origin main; then
              echo "Successfully pushed"
              exit 0
            fi
            
            if [ $attempt -lt 5 ]; then
              sleep $((attempt * 2))
            fi
          done
          
          echo "Failed to push after 5 attempts"
          exit 1



